<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 3D 虚拟伴侣</title>
  <!-- 魔珐星云具身驱动 SDK -->
  <script src="https://media.xingyun3d.com/xingyun3d/general/litesdk/xmovAvatar@latest.js"></script>

  <style>
    /* =================== Reset & Base =================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #6c5ce7;
      --primary-light: #a29bfe;
      --primary-dark: #5041c4;
      --bg: #0f0e17;
      --bg-card: #1a1932;
      --bg-input: #252348;
      --text: #fffffe;
      --text-dim: #94a1b2;
      --text-muted: #6b7280;
      --border: #2d2b55;
      --success: #2dd4bf;
      --warning: #fbbf24;
      --danger: #ef4444;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;

      /* chat panel dynamic */
      --chat-width: 380px;
      --chat-min-width: 280px;
      --chat-max-width: 600px;
    }
    html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text); }
    body { display: flex; flex-direction: column; overflow: hidden; }

    /* =================== Scrollbar =================== */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* =================== Top Bar =================== */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px; background: var(--bg-card); border-bottom: 1px solid var(--border);
      flex-shrink: 0; z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .logo { width: 34px; height: 34px; border-radius: 8px; background: linear-gradient(135deg,var(--primary),var(--primary-light)); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .topbar-title { font-size: 16px; font-weight: 600; white-space: nowrap; }
    .topbar-title span { color: var(--primary-light); }
    .topbar-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-dim); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); transition: background 0.3s; flex-shrink: 0; }
    .status-dot.connected { background: var(--success); }
    .status-dot.connecting { background: var(--warning); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .topbar-right { display: flex; align-items: center; gap: 6px; }
    .btn-icon {
      width: 34px; height: 34px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--bg-input); color: var(--text-dim);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 15px; transition: all 0.2s; flex-shrink: 0;
    }
    .btn-icon:hover { background: var(--border); color: var(--text); border-color: var(--primary); }
    .btn-icon.active { border-color: var(--primary); color: var(--primary-light); background: rgba(108,92,231,0.15); }

    /* =================== Setup Overlay =================== */
    .setup-overlay {
      position: fixed; inset: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      background: rgba(15,14,23,0.92); backdrop-filter: blur(12px);
      opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
    }
    .setup-overlay.active { opacity: 1; pointer-events: all; }
    .setup-card {
      width: 520px; max-width: 92vw; max-height: 90vh; overflow-y: auto;
      background: var(--bg-card); border-radius: 20px; padding: 36px;
      border: 1px solid var(--border); box-shadow: var(--shadow);
    }
    .setup-card h2 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .setup-card .subtitle { color: var(--text-dim); font-size: 13px; margin-bottom: 24px; line-height: 1.6; }
    .setup-card .subtitle a { color: var(--primary-light); text-decoration: none; }
    .setup-card .subtitle a:hover { text-decoration: underline; }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--text-dim); margin-bottom: 5px; }
    .form-group .hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .form-row { display: flex; gap: 10px; }
    .form-row .form-group { flex: 1; }
    input, select, textarea {
      width: 100%; padding: 9px 12px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--bg-input);
      color: var(--text); font-size: 13px; font-family: var(--font);
      outline: none; transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); }
    textarea { resize: vertical; min-height: 52px; }
    select { cursor: pointer; appearance: auto; }
    input::placeholder, textarea::placeholder { color: var(--text-muted); }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 9px 20px; border-radius: var(--radius-sm); border: none;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
      font-family: var(--font); white-space: nowrap;
    }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #fff; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(108,92,231,0.4); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-secondary { background: var(--bg-input); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .btn-success { background: rgba(45,212,191,0.12); color: var(--success); border: 1px solid rgba(45,212,191,0.25); }
    .btn-success:hover { background: rgba(45,212,191,0.2); }
    .btn-full { width: 100%; padding: 11px; font-size: 14px; margin-top: 6px; }
    .btn-sm { padding: 5px 10px; font-size: 11px; }

    /* =================== Layout Toggle (radio buttons as tabs) =================== */
    .toggle-group {
      display: flex; background: var(--bg-input); border-radius: var(--radius-sm);
      border: 1px solid var(--border); overflow: hidden;
    }
    .toggle-group label {
      flex: 1; padding: 8px 12px; text-align: center; cursor: pointer;
      font-size: 12px; color: var(--text-muted); transition: all 0.2s;
      user-select: none; border-right: 1px solid var(--border);
    }
    .toggle-group label:last-child { border-right: none; }
    .toggle-group input { display: none; }
    .toggle-group input:checked + label { background: var(--primary); color: #fff; font-weight: 500; }

    /* =================== Main Layout =================== */
    .main-layout {
      display: flex; flex: 1; overflow: hidden; position: relative;
    }

    /* =================== Avatar Area =================== */
    /* 遵循魔珐星云官方文档：父容器撑满、相对定位，SDK 容器 100% 宽高 */
    .avatar-area {
      flex: 1; position: relative; background: var(--bg); overflow: hidden;
      min-width: 0;
    }
    .avatar-area .placeholder {
      position: absolute; inset: 0; z-index: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; color: var(--text-muted); padding: 40px;
    }
    .avatar-area .placeholder .icon { font-size: 60px; margin-bottom: 14px; opacity: 0.45; }
    .avatar-area .placeholder h3 { font-size: 16px; color: var(--text-dim); margin-bottom: 6px; }
    .avatar-area .placeholder p { font-size: 12px; max-width: 300px; line-height: 1.6; margin: 0 auto; }

    /* SDK 容器 — 普通块级元素撑满父容器，SDK 内部 Canvas 使用 absolute + scale 自适应 */
    #sdk-container {
      width: 100%;
      height: 100%;
      position: relative;
      z-index: 2;
    }
    /* 不强制覆盖 canvas 样式，让 SDK 内部算法自由控制 position/left/top/scale */

    /* Avatar status overlay */
    .avatar-status {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      padding: 6px 18px; border-radius: 20px; font-size: 12px;
      background: rgba(15,14,23,0.8); backdrop-filter: blur(8px);
      border: 1px solid var(--border); display: flex; align-items: center; gap: 8px;
      transition: all 0.3s; opacity: 0; pointer-events: none; white-space: nowrap;
      z-index: 25;
    }
    .avatar-status.show { opacity: 1; }
    .avatar-status .spinner { width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--primary-light); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* =================== Chat Panel — FLOATING OVERLAY =================== */
    .chat-panel {
      position: absolute;
      top: 12px; bottom: 12px;
      width: var(--chat-width); min-width: var(--chat-min-width); max-width: var(--chat-max-width);
      background: var(--bg-card); border-radius: var(--radius);
      border: 1px solid var(--border); box-shadow: var(--shadow);
      display: flex; flex-direction: column; overflow: hidden;
      z-index: 50; transition: none;
      resize: none; /* no native resize */
    }
    /* position classes */
    .chat-panel.pos-right { right: 12px; }
    .chat-panel.pos-left  { left: 12px; }

    /* collapsed state */
    .chat-panel.collapsed { width: auto !important; min-width: auto; }
    .chat-panel.collapsed .chat-header { border-bottom: none; }
    .chat-panel.collapsed .chat-messages,
    .chat-panel.collapsed .chat-input-area { display: none; }

    /* drag handle (top bar of chat) */
    .chat-drag-handle {
      cursor: grab; flex-shrink: 0;
      display: flex; align-items: center; gap: 8px;
      padding: 12px 16px; user-select: none;
    }
    .chat-drag-handle:active { cursor: grabbing; }

    .chat-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px 0 0; border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .chat-header-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .chat-header-left h3 { font-size: 13px; font-weight: 600; white-space: nowrap; }
    .chat-drag-icon { color: var(--text-muted); font-size: 12px; cursor: grab; display: flex; align-items: center; }
    .chat-drag-icon:active { cursor: grabbing; }
    .chat-header-right { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .chat-header .count { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

    .chat-header-btn {
      width: 26px; height: 26px; border-radius: 6px;
      border: none; background: transparent; color: var(--text-muted);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 13px; transition: all 0.2s; flex-shrink: 0;
    }
    .chat-header-btn:hover { background: var(--bg-input); color: var(--text); }

    /* Resize handle */
    .chat-resize-handle {
      position: absolute; top: 0; bottom: 0; width: 5px;
      cursor: ew-resize; z-index: 5;
    }
    .chat-panel.pos-right .chat-resize-handle { left: -2px; }
    .chat-panel.pos-left .chat-resize-handle { right: -2px; }
    .chat-resize-handle:hover,
    .chat-resize-handle.resizing { background: var(--primary); opacity: 0.3; }

    /* Chat messages */
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 12px 16px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .chat-messages .empty {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 13px; text-align: center; line-height: 1.8;
      flex-direction: column; gap: 10px;
    }
    .chat-messages .empty .icon { font-size: 36px; opacity: 0.35; }

    .msg {
      display: flex; gap: 10px; animation: msgIn 0.25s ease;
    }
    @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg.user { flex-direction: row-reverse; }
    .msg .avatar {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 12px;
    }
    .msg.assistant .avatar { background: linear-gradient(135deg, var(--primary), var(--primary-light)); }
    .msg.user .avatar { background: var(--bg-input); border: 1px solid var(--border); }
    .msg .bubble {
      max-width: 80%; padding: 8px 14px; border-radius: 10px;
      font-size: 13px; line-height: 1.55; word-break: break-word;
    }
    .msg.assistant .bubble { background: var(--bg-input); border: 1px solid var(--border); border-top-left-radius: 2px; }
    .msg.user .bubble { background: var(--primary); color: #fff; border-top-right-radius: 2px; }
    .msg .bubble .time {
      font-size: 10px; color: var(--text-muted); margin-top: 4px; display: block;
    }
    .msg.user .bubble .time { color: rgba(255,255,255,0.5); }

    /* Typing indicator */
    .typing .bubble { display: flex; gap: 4px; align-items: center; padding: 12px 16px; }
    .typing .bubble .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-muted); animation: typingDot 1.4s infinite; }
    .typing .bubble .dot:nth-child(2) { animation-delay: 0.2s; }
    .typing .bubble .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingDot { 0%,60%,100% { opacity: 0.2; } 30% { opacity: 1; } }

    .msg .bubble pre {
      background: rgba(0,0,0,0.3); border-radius: 5px; padding: 8px; margin: 6px 0; overflow-x: auto; font-size: 12px;
    }
    .msg .bubble code { font-size: 12px; background: rgba(0,0,0,0.2); padding: 1px 4px; border-radius: 3px; }
    .msg .bubble pre code { background: none; padding: 0; }

    /* Chat input */
    .chat-input-area {
      padding: 10px 12px; border-top: 1px solid var(--border);
      display: flex; gap: 8px; align-items: flex-end;
    }
    .chat-input-area textarea {
      flex: 1; border-radius: var(--radius-sm); min-height: 38px; max-height: 100px;
      padding: 8px 12px; resize: none; line-height: 1.4; font-size: 13px;
    }
    .chat-input-area .btn-send {
      width: 38px; height: 38px; border-radius: var(--radius-sm); flex-shrink: 0;
      border: none; background: var(--primary); color: #fff; font-size: 16px;
      cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center;
    }
    .chat-input-area .btn-send:hover { background: var(--primary-dark); }
    .chat-input-area .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

    /* =================== Progress bar =================== */
    .progress-bar-wrap {
      width: 100%; height: 3px; background: var(--border); border-radius: 2px;
      overflow: hidden; position: absolute; top: 0; left: 0; display: none; z-index: 30;
    }
    .progress-bar-wrap.active { display: block; }
    .progress-bar-fill {
      height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transition: width 0.3s ease; border-radius: 2px; width: 0%;
    }

    /* =================== Avatar action buttons =================== */
    .avatar-actions {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 6px; z-index: 20; flex-wrap: wrap; justify-content: center;
    }
    .avatar-actions .btn {
      background: rgba(15,14,23,0.75); backdrop-filter: blur(8px);
      border: 1px solid var(--border);
    }
    .avatar-actions .btn:hover { border-color: var(--primary); }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      padding: 10px 22px; border-radius: var(--radius-sm); font-size: 12px;
      background: var(--bg-card); border: 1px solid var(--border); box-shadow: var(--shadow);
      opacity: 0; transition: all 0.3s; z-index: 2000; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { border-color: var(--danger); }
    .toast.success { border-color: var(--success); }

    /* =================== Markdown =================== */
    .msg .bubble p { margin: 4px 0; }
    .msg .bubble p:first-child { margin-top: 0; }
    .msg .bubble p:last-child { margin-bottom: 0; }
    .msg .bubble ul, .msg .bubble ol { padding-left: 18px; margin: 4px 0; }
    .msg .bubble blockquote { border-left: 3px solid var(--primary); padding-left: 10px; margin: 6px 0; color: var(--text-dim); }
    .msg .bubble h1, .msg .bubble h2, .msg .bubble h3, .msg .bubble h4 { margin: 8px 0 4px; font-size: 14px; }

    /* =================== Responsive =================== */
    @media (max-width: 900px) {
      .chat-panel {
        --chat-width: min(85vw, 380px) !important;
        top: 8px; bottom: 8px;
      }
      .chat-panel.pos-right { right: 8px; }
      .chat-panel.pos-left  { left: 8px; }
      .setup-card { padding: 24px 16px; }
    }
  </style>
</head>
<body>

  <!-- ==================== Setup Overlay ==================== -->
  <div class="setup-overlay active" id="setupOverlay">
    <div class="setup-card">
      <h2>✨ AI 3D 虚拟伴侣</h2>
      <p class="subtitle">
        输入凭证，即可创建专属你的 3D AI 助手。
        需要 <a href="https://xingyun3d.com" target="_blank">魔珐星云</a> App ID &amp; Secret
        和 <a href="https://platform.deepseek.com/" target="_blank">DeepSeek</a>（或兼容 OpenAI）的 API Key。
      </p>

      <!-- 对话框位置 -->
      <div class="form-group">
        <label>📐 对话框位置</label>
        <div class="toggle-group">
          <input type="radio" name="chatPos" id="posLeft" value="left" />
          <label for="posLeft">⬅ 左侧</label>
          <input type="radio" name="chatPos" id="posRight" value="right" checked />
          <label for="posRight">右侧 ➡</label>
        </div>
      </div>

      <!-- 魔珐星云配置 -->
      <div class="form-group">
        <label>🔹 魔珐星云 App ID</label>
        <input type="text" id="appId" placeholder="输入你的 App ID" />
      </div>
      <div class="form-group">
        <label>🔹 魔珐星云 App Secret</label>
        <input type="password" id="appSecret" placeholder="输入你的 App Secret" />
      </div>
      <div class="form-group">
        <label>🔹 网关地址</label>
        <input type="text" id="gatewayServer" value="https://nebula-agent.xingyun3d.com/user/v1/ttsa/session" placeholder="网关地址" />
        <div class="hint">默认使用魔珐星云官方网关</div>
      </div>

      <hr style="border-color:var(--border); margin: 16px 0;" />

      <!-- LLM 配置 -->
      <div class="form-group">
        <label>🔹 LLM API Key</label>
        <input type="password" id="llmApiKey" placeholder="DeepSeek / OpenAI API Key" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>API 地址</label>
          <input type="text" id="llmBaseUrl" value="https://api.deepseek.com" placeholder="API Base URL" />
        </div>
        <div class="form-group" style="max-width: 130px;">
          <label>模型</label>
          <select id="llmModel">
            <option value="deepseek-chat">deepseek-chat</option>
            <option value="gpt-4o">GPT-4o</option>
            <option value="gpt-4o-mini">GPT-4o-mini</option>
            <option value="gpt-4-turbo">GPT-4-Turbo</option>
            <option value="qwen-plus">通义千问-Plus</option>
            <option value="custom">自定义</option>
          </select>
        </div>
      </div>
      <div class="form-group" id="customModelGroup" style="display:none;">
        <label>自定义模型名称</label>
        <input type="text" id="customModel" placeholder="输入模型名称" />
      </div>
      <div class="form-group">
        <label>系统提示词</label>
        <textarea id="systemPrompt" placeholder="设定 AI 助手的人设和回答风格...">你是一个 3D AI 虚拟伴侣，请用简洁、自然、口语化的中文回答用户问题。你温柔、耐心、善解人意，回答时请加入适当的情感表达。</textarea>
      </div>

      <button class="btn btn-primary btn-full" id="connectBtn" onclick="connect()">
        🚀 连接并启动
      </button>
      <p style="text-align:center; color:var(--text-muted); font-size:11px; margin-top:10px;">
        凭证仅存储在浏览器本地，不会上传到任何服务器
      </p>
    </div>
  </div>

  <!-- ==================== Top Bar ==================== -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo">🧬</div>
      <div class="topbar-title">AI <span>3D 伴侣</span></div>
      <div class="topbar-status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">未连接</span>
      </div>
    </div>
    <div class="topbar-right">
      <button class="btn-icon" onclick="toggleChatSide()" title="切换对话框左右侧" id="btnSideToggle">
        ⇔
      </button>
      <button class="btn-icon" onclick="toggleInterrupt()" title="打断播报" id="btnInterrupt" style="display:none;">
        ⏹
      </button>
      <button class="btn-icon" onclick="clearChat()" title="清空对话">🗑</button>
      <button class="btn-icon" onclick="showSetup()" title="设置">⚙️</button>
    </div>
  </header>

  <!-- ==================== Main Layout ==================== -->
  <div class="main-layout">
    <!-- Avatar Area -->
    <div class="avatar-area" id="avatarArea">
      <div class="progress-bar-wrap" id="progressBar">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>

      <!-- SDK挂载容器 -->
      <div id="sdk-container"></div>

      <!-- 未连接时的占位 -->
      <div class="placeholder" id="placeholder">
        <div class="icon">🧑‍🚀</div>
        <h3>等待连接...</h3>
        <p>点击 ⚙️ 输入凭证，连接你的 AI 3D 虚拟伴侣</p>
      </div>

      <!-- 状态显示 -->
      <div class="avatar-status" id="avatarStatus">
        <span class="spinner"></span>
        <span id="avatarStatusText">数字人思考中...</span>
      </div>

      <!-- 快捷操作 -->
      <div class="avatar-actions" id="avatarActions" style="display:none;">
        <button class="btn btn-sm btn-success" onclick="sdkSpeak('你好，我是你的 AI 伴侣，很高兴见到你！')">👋 打招呼</button>
        <button class="btn btn-sm btn-secondary" onclick="sdkDance()">💃 跳舞</button>
        <button class="btn btn-sm btn-secondary" onclick="sdkIdle()">🧘 待机</button>
      </div>
    </div>

    <!-- ==================== Chat Panel (floating) ==================== -->
    <div class="chat-panel pos-right" id="chatPanel">
      <!-- resize handle -->
      <div class="chat-resize-handle" id="resizeHandle"></div>

      <div class="chat-header">
        <div class="chat-header-left">
          <span class="chat-drag-icon" id="dragHandle">⠿</span>
          <h3>💬 对话</h3>
        </div>
        <div class="chat-header-right">
          <span class="count" id="msgCount">0</span>
          <button class="chat-header-btn" onclick="toggleCollapse()" id="btnCollapse" title="折叠/展开">—</button>
        </div>
      </div>

      <div class="chat-messages" id="chatMessages">
        <div class="empty">
          <div class="icon">💭</div>
          <div>
            连接成功后即可开始对话<br/>
            AI 会通过 3D 虚拟人回应你
          </div>
        </div>
      </div>
      <div class="chat-input-area">
        <textarea id="chatInput" rows="1" placeholder="输入消息，Enter 发送..." onkeydown="handleInputKeydown(event)" disabled></textarea>
        <button class="btn-send" id="sendBtn" onclick="sendMessage()" disabled>
          ➤
        </button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- ==================== JavaScript ==================== -->
  <script>
    // ======================== State ========================
    const STATE = {
      connected: false,
      sdk: null,
      llmConfig: null,
      messages: [],
      speaking: false,
      thinking: false,
      conversationHistory: [],
      chatPosition: 'right',    // 'left' | 'right'
      chatCollapsed: false,
    };

    // ======================== DOM refs ========================
    const $ = id => document.getElementById(id);
    const setupOverlay = $('setupOverlay');
    const statusDot = $('statusDot');
    const statusText = $('statusText');
    const sdkContainer = $('sdk-container');
    const placeholder = $('placeholder');
    const avatarStatus = $('avatarStatus');
    const avatarStatusText = $('avatarStatusText');
    const avatarActions = $('avatarActions');
    const progressBar = $('progressBar');
    const progressFill = $('progressFill');
    const chatPanel = $('chatPanel');
    const chatMessages = $('chatMessages');
    const chatInput = $('chatInput');
    const sendBtn = $('sendBtn');
    const msgCount = $('msgCount');
    const btnInterrupt = $('btnInterrupt');
    const btnSideToggle = $('btnSideToggle');
    const btnCollapse = $('btnCollapse');
    const resizeHandle = $('resizeHandle');
    const dragHandle = $('dragHandle');
    const toast = $('toast');

    // ======================== Toast ========================
    let toastTimer;
    function showToast(msg, type = '') {
      toast.textContent = msg;
      toast.className = 'toast ' + type;
      clearTimeout(toastTimer);
      void toast.offsetWidth;
      toast.classList.add('show');
      toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ======================== Position / Resize / Drag ========================

    // ---- Toggle side ----
    function toggleChatSide() {
      const newPos = STATE.chatPosition === 'right' ? 'left' : 'right';
      STATE.chatPosition = newPos;
      chatPanel.classList.remove('pos-right', 'pos-left');
      chatPanel.classList.add('pos-' + newPos);
      saveConfig();
      showToast(newPos === 'left' ? '对话框已移至左侧' : '对话框已移至右侧');
    }

    // ---- Collapse ----
    function toggleCollapse() {
      STATE.chatCollapsed = !STATE.chatCollapsed;
      chatPanel.classList.toggle('collapsed', STATE.chatCollapsed);
      btnCollapse.textContent = STATE.chatCollapsed ? '□' : '—';
      saveConfig();
    }

    // ---- Resize ----
    let isResizing = false, startX = 0, startW = 0;
    resizeHandle.addEventListener('mousedown', (e) => {
      isResizing = true; startX = e.clientX;
      startW = chatPanel.offsetWidth;
      resizeHandle.classList.add('resizing');
      e.preventDefault();
    });
    document.addEventListener('mousemove', (e) => {
      if (!isResizing) return;
      const isRight = STATE.chatPosition === 'right';
      const delta = isRight ? (startX - e.clientX) : (e.clientX - startX);
      let newW = startW + delta;
      const minW = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--chat-min-width')) || 280;
      const maxW = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--chat-max-width')) || 600;
      newW = Math.max(minW, Math.min(maxW, newW));
      chatPanel.style.width = newW + 'px';
    });
    document.addEventListener('mouseup', () => {
      if (isResizing) {
        isResizing = false;
        resizeHandle.classList.remove('resizing');
        // save width
        const w = chatPanel.offsetWidth;
        try {
          const cfg = JSON.parse(localStorage.getItem('ai3d_config')) || {};
          cfg.chatWidth = w;
          localStorage.setItem('ai3d_config', JSON.stringify(cfg));
        } catch(e) {}
      }
    });

    // ---- Drag (reposition within viewport) ----
    // We implement a constrained "nudge" drag — shift the panel within the avatar area.
    let isDragging = false, dragStartX = 0, dragStartY = 0;
    let panelOffsetX = 0, panelOffsetY = 0; // additional offset from default position

    // We'll use transform to offset, clamped so panel stays on screen
    function clampPanelOffset() {
      const rect = chatPanel.getBoundingClientRect();
      const areaRect = document.querySelector('.main-layout').getBoundingClientRect();
      // Compute bounds — panel must stay fully within the main layout
      const maxDX = areaRect.width - rect.width - 12;
      const maxDY = areaRect.height - rect.height - 12;
      panelOffsetX = Math.max(12 - (STATE.chatPosition === 'right' ? (areaRect.width - rect.right) : rect.left),
                              Math.min(maxDX, panelOffsetX));
      panelOffsetY = Math.max(12 - (rect.top - areaRect.top),
                              Math.min(maxDY, panelOffsetY));
    }

    dragHandle.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      isDragging = true;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      // Reset any existing transform offset to compute from current position
      chatPanel.style.transform = '';
      panelOffsetX = 0; panelOffsetY = 0;
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const dx = e.clientX - dragStartX;
      const dy = e.clientY - dragStartY;

      // Apply as transform, clamped
      const area = document.querySelector('.main-layout');
      const areaRect = area.getBoundingClientRect();
      const rect = chatPanel.getBoundingClientRect();

      let newX = dx;
      let newY = dy;

      // Clamp X
      if (STATE.chatPosition === 'right') {
        // right-aligned: offset from right edge
        const rightEdge = areaRect.right - 12;
        const panelRight = rect.right + dx;
        if (panelRight > rightEdge) newX = rightEdge - rect.right;
        if (rect.left + dx < 12) newX = 12 - rect.left;
      } else {
        if (rect.left + dx < 12) newX = 12 - rect.left;
        const rightEdge = areaRect.right - 12;
        if (rect.right + dx > rightEdge) newX = rightEdge - rect.right;
      }
      // Clamp Y
      if (rect.top + dy < 12) newY = 12 - rect.top;
      const bottomEdge = areaRect.bottom - 12;
      if (rect.bottom + dy > bottomEdge) newY = bottomEdge - rect.bottom;

      panelOffsetX = newX;
      panelOffsetY = newY;
      chatPanel.style.transform = `translate(${newX}px, ${newY}px)`;
    });

    document.addEventListener('mouseup', () => {
      if (isDragging) {
        isDragging = false;
        // save offset
        try {
          const cfg = JSON.parse(localStorage.getItem('ai3d_config')) || {};
          cfg.chatOffsetX = panelOffsetX;
          cfg.chatOffsetY = panelOffsetY;
          localStorage.setItem('ai3d_config', JSON.stringify(cfg));
        } catch(e) {}
      }
    });

    // ---- Apply saved offset ----
    function applySavedOffset(cfg) {
      if (cfg && (cfg.chatOffsetX || cfg.chatOffsetY)) {
        panelOffsetX = cfg.chatOffsetX || 0;
        panelOffsetY = cfg.chatOffsetY || 0;
        chatPanel.style.transform = `translate(${panelOffsetX}px, ${panelOffsetY}px)`;
      }
    }

    // ======================== Setup ========================
    function showSetup() { setupOverlay.classList.add('active'); }
    function hideSetup() { setupOverlay.classList.remove('active'); }

    // Custom model toggle
    $('llmModel').addEventListener('change', function() {
      $('customModelGroup').style.display = this.value === 'custom' ? 'block' : 'none';
    });

    // ======================== Config ========================
    function loadSavedConfig() {
      try {
        const saved = JSON.parse(localStorage.getItem('ai3d_config'));
        if (!saved) return;

        // position
        if (saved.chatPosition === 'left') {
          STATE.chatPosition = 'left';
          document.getElementById('posLeft').checked = true;
          chatPanel.classList.remove('pos-right');
          chatPanel.classList.add('pos-left');
        } else {
          document.getElementById('posRight').checked = true;
        }

        // collapsed
        if (saved.chatCollapsed) {
          STATE.chatCollapsed = true;
          chatPanel.classList.add('collapsed');
          btnCollapse.textContent = '□';
        }

        // width
        if (saved.chatWidth) {
          chatPanel.style.width = saved.chatWidth + 'px';
        }

        // offset
        applySavedOffset(saved);

        // fields
        if (saved.appId) $('appId').value = saved.appId;
        if (saved.appSecret) $('appSecret').value = saved.appSecret;
        if (saved.gatewayServer) $('gatewayServer').value = saved.gatewayServer;
        if (saved.llmApiKey) $('llmApiKey').value = saved.llmApiKey;
        if (saved.llmBaseUrl) $('llmBaseUrl').value = saved.llmBaseUrl;
        if (saved.llmModel) $('llmModel').value = saved.llmModel;
        if (saved.systemPrompt) $('systemPrompt').value = saved.systemPrompt;
        if (saved.customModel) $('customModel').value = saved.customModel;
        if (saved.llmModel === 'custom') $('customModelGroup').style.display = 'block';
      } catch(e) {}
    }

    function saveConfig() {
      const config = {
        appId: $('appId').value.trim(),
        appSecret: $('appSecret').value.trim(),
        gatewayServer: $('gatewayServer').value.trim(),
        llmApiKey: $('llmApiKey').value.trim(),
        llmBaseUrl: $('llmBaseUrl').value.trim(),
        llmModel: $('llmModel').value,
        systemPrompt: $('systemPrompt').value.trim(),
        customModel: $('customModel').value.trim(),
        chatPosition: STATE.chatPosition,
        chatCollapsed: STATE.chatCollapsed,
        chatWidth: chatPanel.offsetWidth,
        chatOffsetX: panelOffsetX,
        chatOffsetY: panelOffsetY,
      };
      try { localStorage.setItem('ai3d_config', JSON.stringify(config)); } catch(e) {}
      return config;
    }

    // ======================== Connection ========================
    async function connect() {
      // Read position from radio before saving
      const posRadio = document.querySelector('input[name="chatPos"]:checked');
      if (posRadio) {
        STATE.chatPosition = posRadio.value;
        chatPanel.classList.remove('pos-right', 'pos-left');
        chatPanel.classList.add('pos-' + STATE.chatPosition);
      }

      const config = saveConfig();
      if (!config.appId || !config.appSecret) {
        showToast('请输入 魔珐星云 App ID 和 App Secret', 'error');
        return;
      }
      if (!config.llmApiKey) {
        showToast('请输入 LLM API Key', 'error');
        return;
      }

      const connectBtn = $('connectBtn');
      connectBtn.disabled = true;
      connectBtn.textContent = '⏳ 连接中...';

      setStatus('connecting', '连接中...');
      progressBar.classList.add('active');

      try {
        STATE.llmConfig = {
          apiKey: config.llmApiKey,
          baseUrl: config.llmBaseUrl.replace(/\/+$/, ''),
          model: config.llmModel === 'custom' ? config.customModel : config.llmModel,
          systemPrompt: config.systemPrompt || '你是一个 AI 助手，请用简洁自然的中文回答。',
        };

        STATE.conversationHistory = [
          { role: 'system', content: STATE.llmConfig.systemPrompt }
        ];

        if (typeof XmovAvatar === 'undefined') {
          throw new Error('魔珐星云 SDK 未加载，请检查网络连接');
        }

        STATE.sdk = new XmovAvatar({
          containerId: '#sdk-container',
          appId: config.appId,
          appSecret: config.appSecret,
          gatewayServer: config.gatewayServer || 'https://nebula-agent.xingyun3d.com/user/v1/ttsa/session',

          onMessage(message) {
            console.log('[SDK]', message);
            if (message.code === 10001) {
              showToast('容器不存在，请刷新重试', 'error');
            } else if (message.code === 10003) {
              showToast('会话创建失败，请检查 App ID 和 App Secret', 'error');
            }
          },

          onVoiceStateChange(status) {
            console.log('[Voice]', status);
            if (status === 'voice_start' || status === 'start') {
              STATE.speaking = true;
              setStatus('connected', '播报中...');
              btnInterrupt.style.display = 'flex';
            } else if (status === 'voice_end' || status === 'end') {
              STATE.speaking = false;
              btnInterrupt.style.display = 'none';
              if (!STATE.thinking) setStatus('connected', '在线');
            }
          },

          onDownloadProgress(progress) {
            progressFill.style.width = progress + '%';
            setStatus('connecting', '加载资源 ' + progress + '%');
          },
        });

        await STATE.sdk.init({
          onDownloadProgress(progress) {
            progressFill.style.width = progress + '%';
            setStatus('connecting', '加载资源 ' + progress + '%');
          },
        });

        STATE.connected = true;
        setStatus('connected', '在线');
        progressBar.classList.remove('active');
        placeholder.style.display = 'none';
        avatarActions.style.display = 'flex';
        chatInput.disabled = false;
        sendBtn.disabled = false;
        chatInput.focus();

        hideSetup();
        showToast('✅ 连接成功！3D 虚拟伴侣已就绪', 'success');

        setTimeout(() => {
          if (STATE.sdk) STATE.sdk.speak('你好，我是你的 AI 3D 伴侣，很高兴见到你！', true, true);
        }, 500);

        addMessage('assistant', '✨ 你好！我是你的 AI 3D 虚拟伴侣，已经准备好为你服务了！有什么想聊的吗？');

      } catch (err) {
        console.error('Connection error:', err);
        setStatus('disconnected', '连接失败');
        progressBar.classList.remove('active');
        showToast('连接失败: ' + err.message, 'error');
      } finally {
        connectBtn.disabled = false;
        connectBtn.textContent = '🚀 连接并启动';
      }
    }

    // ======================== Status ========================
    function setStatus(state, text) {
      statusDot.className = 'status-dot';
      if (state === 'connected') statusDot.classList.add('connected');
      else if (state === 'connecting') statusDot.classList.add('connecting');
      statusText.textContent = text;
    }

    // ======================== SDK Controls ========================
    function sdkSpeak(text) {
      if (STATE.sdk && STATE.connected) {
        STATE.sdk.speak(text, true, true);
        addMessage('assistant', text);
      } else {
        showToast('请先连接数字人', 'error');
      }
    }

    function sdkDance() {
      if (!STATE.sdk || !STATE.connected) { showToast('请先连接数字人', 'error'); return; }
      const ssml = `<speak>
          <ue4event>
            <type>ka</type>
            <data><action_semantic>Dance</action_semantic></data>
          </ue4event>
          我来为你跳一支舞吧！
        </speak>`.trim().replace(/\s+/g, ' ');
      STATE.sdk.speak(ssml, true, true);
      addMessage('assistant', '💃 我来为你跳一支舞吧！');
    }

    function sdkIdle() {
      if (STATE.sdk && STATE.connected) { STATE.sdk.idle(); showToast('已切换为待机状态'); }
    }

    function toggleInterrupt() {
      if (STATE.sdk && STATE.connected) {
        STATE.sdk.interactiveidle();
        STATE.speaking = false; STATE.thinking = false;
        btnInterrupt.style.display = 'none';
        setStatus('connected', '在线');
        showToast('⏹ 已打断播报');
      }
    }

    // ======================== Chat ========================
    function handleInputKeydown(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    async function sendMessage() {
      const text = chatInput.value.trim();
      if (!text || !STATE.connected || STATE.thinking) return;
      chatInput.value = '';
      chatInput.style.height = 'auto';

      addMessage('user', text);
      STATE.conversationHistory.push({ role: 'user', content: text });

      STATE.thinking = true;
      showTyping();
      if (STATE.sdk) STATE.sdk.think();
      setStatus('connected', '思考中...');

      try {
        const reply = await callLLM(STATE.conversationHistory);
        hideTyping();
        addMessage('assistant', reply);
        STATE.conversationHistory.push({ role: 'assistant', content: reply });
        STATE.thinking = false;
        if (STATE.sdk) STATE.sdk.speak(reply, true, true);
        setStatus('connected', '播报中...');
        btnInterrupt.style.display = 'flex';
      } catch (err) {
        hideTyping();
        STATE.thinking = false;
        console.error('LLM error:', err);
        const errMsg = '抱歉，AI 服务暂时不可用，请稍后再试。';
        addMessage('assistant', errMsg);
        if (STATE.sdk) STATE.sdk.speak(errMsg, true, true);
        setStatus('connected', '在线');
        showToast('请求 AI 失败: ' + err.message, 'error');
      }
    }

    async function callLLM(messages) {
      const cfg = STATE.llmConfig;
      if (!cfg) throw new Error('LLM 未配置');
      const url = cfg.baseUrl + '/chat/completions';
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + cfg.apiKey },
        body: JSON.stringify({
          model: cfg.model || 'deepseek-chat',
          messages: messages,
          temperature: 0.7,
          max_tokens: 2000,
          stream: false,
        }),
      });
      if (!res.ok) {
        let errMsg = 'HTTP ' + res.status;
        try { const d = await res.json(); errMsg = d.error?.message || errMsg; } catch(e) {}
        throw new Error(errMsg);
      }
      const data = await res.json();
      return data.choices?.[0]?.message?.content || '抱歉，我没有理解你的问题。';
    }

    // ======================== Chat UI ========================
    function addMessage(role, content) {
      const empty = chatMessages.querySelector('.empty');
      if (empty) empty.remove();
      hideTyping();

      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.innerHTML = `
        <div class="avatar">${role === 'assistant' ? '🧬' : '👤'}</div>
        <div class="bubble">
          ${renderContent(content)}
          <span class="time">${new Date().toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' })}</span>
        </div>`;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      updateMsgCount();
    }

    function renderContent(text) {
      if (!text) return '';
      let html = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
      html = html.replace(/\n/g, '<br/>');
      html = html.replace(/(<br\/>\s*){2,}/g, '</p><p>');
      html = '<p>' + html + '</p>';
      html = html.replace(/<p><br\/><\/p>/g,'<p></p>').replace(/<p><\/p>/g,'');
      return html;
    }

    function showTyping() {
      const empty = chatMessages.querySelector('.empty');
      if (empty) empty.remove();
      if (document.getElementById('typingIndicator')) return;
      const div = document.createElement('div');
      div.className = 'msg assistant typing'; div.id = 'typingIndicator';
      div.innerHTML = '<div class="avatar">🧬</div><div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function hideTyping() {
      const t = document.getElementById('typingIndicator'); if (t) t.remove();
    }

    function updateMsgCount() {
      msgCount.textContent = chatMessages.querySelectorAll('.msg:not(.typing)').length;
    }

    function clearChat() {
      STATE.conversationHistory = [{ role: 'system', content: STATE.llmConfig?.systemPrompt || '你是一个 AI 助手。' }];
      chatMessages.innerHTML = '<div class="empty"><div class="icon">💭</div><div>对话已清空<br/>开始新的对话吧</div></div>';
      updateMsgCount();
      showToast('🗑 对话已清空');
    }

    // ======================== Init ========================
    // Auto-resize textarea
    chatInput.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    });

    loadSavedConfig();

    // Ctrl+Enter send
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'Enter') sendMessage();
    });

    // ======================== 生命周期：页面关闭时销毁 SDK ========================
    // 遵循魔珐星云官方文档建议，防止 "10005 房间限流" 报错
    window.addEventListener('beforeunload', () => {
      if (STATE.sdk) {
        try {
          STATE.sdk.destroy();
        } catch(e) { /* ignore */ }
      }
    });

    console.log('AI 3D 虚拟伴侣已加载 — 拖动 ⠿ 可移动对话框，拖动边缘可调整宽度');
  </script>
</body>
</html>
